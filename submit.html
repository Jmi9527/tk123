<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交工具 - TK123</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header"><div class="header-inner"><div class="header-left"><a href="index.html" class="logo">🎯 TK123</a><nav class="nav-menu"><a href="index.html">首页</a><a href="tools/index.html">工具库</a><a href="news/index.html">资讯</a><a href="activities/index.html">活动</a><a href="about.html">关于</a></nav></div></div></header>
  <div class="container">
    <div class="page-card">
      <h1>提交工具</h1>
      <p>发现好的 TikTok 工具？欢迎提交给我们，审核后将会收录到工具库中。</p>
      <form style="margin-top:24px">
        <div class="form-group"><label>工具名称 *</label><input type="text" placeholder="请输入工具名称" required></div>
        <div class="form-group"><label>开发公司 *</label><input type="text" placeholder="请输入公司或团队名称" required></div>
        <div class="form-group"><label>工具分类 *</label><select required><option value="">请选择</option><option>视频剪辑</option><option>数据分析</option><option>广告投放</option><option>选品带货</option><option>AI 辅助</option><option>店铺管理</option></select></div>
        <div class="form-group"><label>工具描述 *</label><textarea placeholder="请简要描述工具的主要功能和特点" required></textarea></div>
        <div class="form-group"><label>官网链接</label><input type="url" placeholder="https://..."></div>
        <div class="form-group"><label>您的邮箱</label><input type="email" placeholder="用于接收审核结果通知"></div>
        <button type="submit" class="btn btn-primary" style="width:100%">提交</button>
      </form>
      <p style="margin-top:24px;font-size:12px;color:#999">* 为必填项。提交后我们将在 3-5 个工作日内审核并回复。</p>
    </div>
  </div>
  <footer class="footer"><div class="footer-inner"><p class="footer-copy">© 2026 TK123</p></div></footer>
</body>
</html>
